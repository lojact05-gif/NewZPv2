name: Build Windows Installer (ZPv2)

on:
  workflow_dispatch:
  push:
    tags:
      - "zpv2-v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  CONFIGURATION: "Release"
  RUNTIME: "win-x64"
  SELF_CONTAINED: "true"
  WORKDIR: "tools/ZPv2"
  SLN_PATH: "ZPv2.sln"
  ISS_PATH: "installer/ZPv2.iss"

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: |
          Set-Location "${env:WORKDIR}"
          dotnet restore "${env:SLN_PATH}"

      - name: Publish Service
        shell: pwsh
        run: |
          Set-Location "${env:WORKDIR}"
          dotnet publish ".\src\ZPv2.Service\ZPv2.Service.csproj" `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME `
            --self-contained $env:SELF_CONTAINED `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ".\out\publish\Service"

      - name: Publish UI
        shell: pwsh
        run: |
          Set-Location "${env:WORKDIR}"
          dotnet publish ".\src\ZPv2.Ui\ZPv2.Ui.csproj" `
            -c $env:CONFIGURATION `
            -r $env:RUNTIME `
            --self-contained $env:SELF_CONTAINED `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ".\out\publish\Ui"

      - name: Stage package for Inno Setup
        shell: pwsh
        run: |
          Set-Location "${env:WORKDIR}"
          New-Item -ItemType Directory -Force -Path ".\out\publish" | Out-Null
          New-Item -ItemType Directory -Force -Path ".\out\publish\_stage" | Out-Null

          Copy-Item -Force -Recurse ".\out\publish\Service\*" ".\out\publish\_stage\"
          Copy-Item -Force -Recurse ".\out\publish\Ui\*" ".\out\publish\_stage\"

          if (!(Test-Path ".\out\publish\_stage\ZPv2.Service.exe")) { throw "ZPv2.Service.exe não encontrado no stage." }
          if (!(Test-Path ".\out\publish\_stage\ZPv2.Ui.exe")) { throw "ZPv2.Ui.exe não encontrado no stage." }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build Installer (Inno Setup)
        shell: pwsh
        run: |
          Set-Location "${env:WORKDIR}"

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC.exe not found at: $iscc" }
          if (!(Test-Path "${env:ISS_PATH}")) { throw "ISS not found at: ${env:WORKDIR}\\${env:ISS_PATH}" }

          & $iscc ".\${env:ISS_PATH}" /DMyAppVersion="${{ github.ref_name }}" /O".\out\installer"

      - name: Generate SHA256
        shell: pwsh
        run: |
          $installer = "${env:WORKDIR}\out\installer\ZPv2Setup.exe"
          if (!(Test-Path $installer)) { throw "Installer não encontrado em $installer" }
          $hash = Get-FileHash $installer -Algorithm SHA256
          "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), "ZPv2Setup.exe" | Set-Content "${env:WORKDIR}\out\installer\ZPv2Setup.exe.sha256" -Encoding ascii

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZPv2Setup
          path: |
            tools/ZPv2/out/installer/ZPv2Setup.exe
            tools/ZPv2/out/installer/ZPv2Setup.exe.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/zpv2-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tools/ZPv2/out/installer/ZPv2Setup.exe
            tools/ZPv2/out/installer/ZPv2Setup.exe.sha256
          generate_release_notes: true
